version: 2
updates:
  # Python-Abhaengigkeiten (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # Das Base-Image im Dockerfile (z. B. python:3.12-slim)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Die Actions im Workflow (checkout, trivy, hadolint ...)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
